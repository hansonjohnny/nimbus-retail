services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: nimbus
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list || exit 1"]
      interval: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-localdev}@postgres:5432/nimbus
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-do-not-use-in-prod}
      SERVICE_NAME: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  catalog-service:
    build: ./services/catalog-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-localdev}@postgres:5432/nimbus
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: catalog-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cart-service:
    build: ./services/cart-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-localdev}@postgres:5432/nimbus
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-do-not-use-in-prod}
      SERVICE_NAME: cart-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-localdev}@postgres:5432/nimbus
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-do-not-use-in-prod}
      CART_SERVICE_URL: http://cart-service:3003
      SERVICE_NAME: order-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    environment:
      KAFKA_BROKERS: kafka:9092
      SERVICE_NAME: notification-service
    depends_on:
      kafka:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
